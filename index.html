<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCHEDULER 🇮🇶</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;600;700&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #1a1c20;
            --light: #2a2d34;
            --shadow: #0d0e11;
            --accent: #fbbf24;
            --emerald: #10b981;
            --crimson: #e11d48;
            --glow: 0 0 15px rgba(251, 191, 36, 0.8);
            --zebra: rgba(255, 255, 255, 0.02);
            --weekend-bg: rgba(16, 185, 129, 0.12); 
            --day-width: 85px;
            --date-width: 105px;
        }

        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #94a3b8; margin: 0; overflow-x: hidden; }
        
        /* Table Structure */
        table { border-collapse: separate; border-spacing: 0; min-width: 1500px; }
        .ac-container { position: relative; width: 100%; min-width: 200px; direction: rtl; overflow: visible; }
        
        /* Dynamic Column Colors */
        tr td:nth-child(1), thead th:nth-child(1) { --col-color: #fbbf24; }
        tr td:nth-child(2), thead th:nth-child(2) { --col-color: #60a5fa; }
        tr td:nth-child(3), thead th:nth-child(3) { --col-color: #a78bfa; }
        tr td:nth-child(4), thead th:nth-child(4) { --col-color: #f472b6; }
        tr td:nth-child(5), thead th:nth-child(5) { --col-color: #fb7185; }
        tr td:nth-child(6), thead th:nth-child(6) { --col-color: #38bdf8; }
        tr td:nth-child(7), thead th:nth-child(7) { --col-color: #c084fc; }
        tr td:nth-child(8), thead th:nth-child(8) { --col-color: #2dd4bf; }
        tr td:nth-child(9), thead th:nth-child(9) { --col-color: #94a3b8; }
        tr td:nth-child(10), thead th:nth-child(10) { --col-color: #fb923c; }
        tr td:nth-child(11), thead th:nth-child(11) { --col-color: #818cf8; }

        th { position: sticky; top: 0; background: var(--bg); z-index: 20; padding: 1rem; color: var(--col-color); font-weight: 800; font-size: 0.7rem; letter-spacing: 0.1em; border-bottom: 1px solid var(--light); text-shadow: 0 0 10px var(--col-color); }
        tr:nth-child(even) { background-color: var(--zebra); }

        /* Sticky Columns Logic 🇮🇶 */
        .day-col {
            position: sticky !important; right: 0 !important;
            width: var(--day-width) !important; min-width: var(--day-width) !important;
            background-color: var(--bg) !important; z-index: 30 !important;
            text-align: center; color: var(--accent); font-weight: 800; font-size: 0.8rem;
        }
        .date-col {
            position: sticky !important; right: var(--day-width) !important;
            width: var(--date-width) !important; min-width: var(--date-width) !important;
            background-color: var(--bg) !important; z-index: 30 !important;
            border-left: 1px solid rgba(255,255,255,0.1);
            color: #64748b; font-family: 'JetBrains Mono', monospace; text-align: center;
        }
        thead th.day-col, thead th.date-col { z-index: 40 !important; top: 0; }

        /* Weekend Rows */
        tr.weekend-row { background-color: var(--weekend-bg) !important; }
        tr.weekend-row td { --col-color: var(--emerald) !important; }
        tr.weekend-row td.day-col, tr.weekend-row td.date-col { background-color: #1a2e28 !important; }

        /* Input & Ghost Text Alignment */
        .cell-input, .ghost-text {
            width: 100%; padding: 0.8rem; font-size: 0.85rem; line-height: 1.6rem;
            font-family: 'IBM Plex Sans Arabic', sans-serif; text-align: right; box-sizing: border-box;
        }
        .cell-input { position: relative; background: transparent; color: #fff; border-radius: 0.8rem; outline: none; transition: all 0.2s; z-index: 5; border: 1px solid transparent; }
        .cell-input:focus { background: rgba(255, 255, 255, 0.03); border-color: var(--col-color); box-shadow: 0 0 8px var(--col-color); }
        
        .ghost-text { position: absolute; top: 0; right: 0; left: 0; bottom: 0; color: rgba(255, 255, 255, 0.4); pointer-events: none; white-space: pre; overflow: hidden; z-index: 1; direction: rtl; }
        .ghost-offset { color: transparent; visibility: visible; }

        .dropdown-arrow { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #475569; cursor: pointer; z-index: 10; font-size: 0.65rem; }
        .prefilled { color: var(--col-color) !important; filter: brightness(0.8); text-shadow: 0 0 2px var(--col-color); font-weight: 600; }
        .new-entry { color: var(--crimson) !important; text-shadow: 0 0 10px var(--crimson); }

        /* UI Shell */
        .embossed-card { background: var(--bg); border-radius: 2.5rem; box-shadow: 20px 20px 60px var(--shadow), -10px -10px 40px var(--light); }
        .recessed-table-container { background: var(--bg); border-radius: 1.5rem; box-shadow: inset 8px 8px 16px var(--shadow), inset -4px -4px 12px var(--light); overflow-x: auto; }
        
        .led-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-flex; margin-right: 12px; }
        .led-loading { background: var(--crimson); animation: blink 1s infinite; }
        .led-ready { background: var(--emerald); box-shadow: 0 0 15px var(--emerald); }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }

        .custom-menu { position: absolute; top: 100%; right: 0; width: 100%; max-height: 220px; overflow-y: auto; background: #1e2126; border: 1px solid var(--light); border-radius: 0.8rem; z-index: 100; box-shadow: 0 10px 30px var(--shadow); display: none; text-align: right; }
        .custom-menu div { padding: 0.6rem 0.8rem; cursor: pointer; color: #94a3b8; font-size: 0.8rem; }
        .custom-menu div:hover { background: var(--light); color: var(--col-color); }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="app-wrapper" class="max-w-full mx-auto opacity-30 pointer-events-none transition-opacity duration-500">
        <div class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
            <div>
                <h1 class="text-3xl font-extrabold tracking-tight text-white" style="text-shadow: var(--glow)">IRAQI Teaching Hospital Monthly Scheduler 🇮🇶</h1>
                <div class="mt-4 flex items-center bg-black/40 px-6 py-2 rounded-full inline-flex border border-white/5">
                    <span id="led" class="led-dot led-loading"></span>
                    <span id="status-text" class="text-[0.65rem] font-black uppercase tracking-[0.25em] text-rose-500">Initializing...</span>
                </div>
            </div>
            <div class="recessed-table-container p-2 flex items-center bg-black/20">
                <input type="month" id="month-picker" class="bg-transparent text-amber-500 font-bold outline-none p-3 cursor-pointer" onchange="generateTable()">
            </div>
        </div>

        <div id="main-table-area" class="embossed-card p-6">
            <div class="recessed-table-container max-h-[72vh]">
                <table id="schedule-table">
                    <thead><tr id="table-headers"></tr></thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
            <div class="mt-8 flex justify-end">
                <button id="save-btn" onclick="saveAll()" class="bg-[#2a2d34] shadow-xl px-14 py-6 rounded-3xl text-amber-500 font-black uppercase tracking-[0.2em] transition-all hover:bg-black active:scale-95 border border-white/5">
                    UPDATE DATABASE
                </button>
            </div>
        </div>
    </div>

<script>
    const scriptUrl = "https://script.google.com/macros/s/AKfycbwj99w9IceN2W1aF3S-jN6yFypMBszvb1xv7FTUuYrW-GbYjC4ediZHrscrloeprwCSSw/exec";
    const specialties = [
        { id: "NS", name: "Neurosurgery" }, { id: "CT", name: "Cardiothoracic Surgery" },
        { id: "GS", name: "General Surgery" }, { id: "US", name: "Urosurgery" },
        { id: "ENT", name: "ENT" }, { id: "H", name: "Cardiology" },
        { id: "D", name: "Death Certificates" }, { id: "OP", name: "OT Anaesthesia" },
        { id: "ICU", name: "ICU Anaesthesia" }, { id: "R", name: "Radiology" },
        { id: "ON", name: "Oncology" }
    ];

    let nameData = {}; 

    window.onload = () => {
        const now = new Date();
        const nextMonth = new Date(now.getFullYear(), now.getMonth() + 1, 1);
        document.getElementById('month-picker').value = `${nextMonth.getFullYear()}-${String(nextMonth.getMonth() + 1).padStart(2, '0')}`;
        initDataSync();
    };

    async function initDataSync() {
        try {
            const respNames = await fetch(`${scriptUrl}?action=getNames`);
            const allResidents = await respNames.json();
            specialties.forEach(spec => {
                if (spec.id === "OP" || spec.id === "ICU") nameData[spec.id] = allResidents.filter(r => r[1] === "A").map(r => r[0]);
                else if (spec.id === "D") nameData[spec.id] = allResidents.map(r => r[0]);
                else nameData[spec.id] = allResidents.filter(r => r[1] === spec.id).map(r => r[0]);
            });
            generateTable(); 
        } catch (e) { unlockTable(); }
    }

    function generateTable() {
        const picker = document.getElementById('month-picker').value;
        const [year, month] = picker.split('-').map(Number);
        const daysInMonth = new Date(year, month, 0).getDate();
        
        let hHtml = specialties.map(s => `<th>${s.name}</th>`).join('') + `<th class="date-col">Date</th><th class="day-col">Day</th>`;
        document.getElementById('table-headers').innerHTML = hHtml;

        const body = document.getElementById('table-body');
        body.innerHTML = "";
        for (let d = 1; d <= daysInMonth; d++) {
            const dateObj = new Date(year, month-1, d);
            const dateStr = `${String(d).padStart(2, '0')}/${String(month).padStart(2, '0')}/${year}`;
            const dayName = new Intl.DateTimeFormat('ar-IQ', { weekday: 'long' }).format(dateObj);
            const isWeekend = (dateObj.getDay() === 5 || dateObj.getDay() === 6);
            
            const tr = document.createElement('tr');
            if (isWeekend) tr.classList.add('weekend-row');
            
            let rHtml = specialties.map(s => `
                <td><div class="ac-container">
                    <div class="ghost-text" id="ghost-${d}-${s.id}"></div>
                    <input type="text" class="cell-input" id="input-${d}-${s.id}" autocomplete="off" 
                        oninput="handleAC(this, '${s.id}', '${d}-${s.id}')" 
                        onkeydown="handleKeys(event, this, '${d}-${s.id}')" 
                        onblur="handleBlur('${d}-${s.id}')" data-date="${dateStr}" data-spec="${s.id}">
                    <span class="dropdown-arrow" onclick="toggleMenu('${d}-${s.id}', '${s.id}')">▼</span>
                    <div class="custom-menu" id="menu-${d}-${s.id}"></div>
                </div></td>`).join('');
            
            rHtml += `<td class="date-col">${dateStr}</td><td class="day-col">${dayName}</td>`;
            tr.innerHTML = rHtml;
            body.appendChild(tr);
        }
        fetchExistingSchedule();
    }

    async function fetchExistingSchedule() {
        const monthVal = document.getElementById('month-picker').value;
        try {
            const resp = await fetch(`${scriptUrl}?action=getSchedule&month=${monthVal}`);
            const schedule = await resp.json();
            schedule.forEach(row => {
                const day = parseInt(row.date.split('/')[0]);
                const inputEl = document.getElementById(`input-${day}-${row.specCode}`);
                if (inputEl && row.name) {
                    inputEl.value = row.name;
                    inputEl.classList.add('prefilled');
                }
            });
        } finally { unlockTable(); }
    }

    function handleAC(el, specId, uniqueId) {
        const ghost = document.getElementById(`ghost-${uniqueId}`);
        const val = el.value;
        const valLower = val.toLowerCase().trim();
        const prefix = "د. ";
        
        ghost.innerText = ""; 
        ghost.removeAttribute('data-full-match');
        el.classList.remove('prefilled');

        if (val.trim() === "") {
            el.classList.remove('new-entry');
            return;
        }

        el.classList.add('new-entry');

        if (nameData[specId]) {
            const userHasPrefix = val.startsWith("د.") || val.startsWith(prefix);
            const cleanInput = valLower.replace(/^د\.\s*/, "");

            const match = nameData[specId].find(name => {
                const nameLower = name.toLowerCase();
                const cleanName = nameLower.replace(/^د\.\s*/, "");
                return nameLower.startsWith(valLower) || cleanName.startsWith(cleanInput);
            });

            if (match) {
                ghost.setAttribute('data-full-match', match);
                let ghostDisplay = userHasPrefix ? match : match.replace(/^د\.\s*/, "");

                if (ghostDisplay.toLowerCase().startsWith(valLower)) {
                    ghost.innerHTML = `<span class="ghost-offset">${val}</span>${ghostDisplay.substring(val.length)}`;
                    ghost.style.color = "rgba(255, 255, 255, 0.4)";
                } else {
                    ghost.innerText = ghostDisplay;
                    ghost.style.color = "rgba(255, 255, 255, 0.15)";
                }
            }
        }
    }

    function handleKeys(e, el, uniqueId) {
        const ghost = document.getElementById(`ghost-${uniqueId}`);
        const fullMatch = ghost.getAttribute('data-full-match');
        
        if ((e.key === "Tab" || e.key === "ArrowRight" || e.key === "Enter") && fullMatch) {
            if (el.value !== fullMatch) {
                if (e.key !== "ArrowRight") e.preventDefault();
                el.value = fullMatch;
                ghost.innerText = "";
                ghost.removeAttribute('data-full-match');
                return;
            }
        }
        if (e.key === "Enter") {
            e.preventDefault();
            const parts = uniqueId.split('-');
            const nextEl = document.getElementById(`input-${parseInt(parts[0]) + 1}-${parts[1]}`);
            if (nextEl) nextEl.focus(); else el.blur();
        }
    }

    function handleBlur(uniqueId) {
        const ghost = document.getElementById(`ghost-${uniqueId}`);
        const input = document.getElementById(`input-${uniqueId}`);
        const fullMatch = ghost.getAttribute('data-full-match');
        
        if (fullMatch && input.value.trim() !== "") {
            input.value = fullMatch;
            input.classList.add('new-entry');
        }
        setTimeout(() => {
            ghost.innerText = "";
            ghost.removeAttribute('data-full-match');
            const menu = document.getElementById(`menu-${uniqueId}`);
            if (menu) menu.style.display = "none";
        }, 220);
    }

    function toggleMenu(uniqueId, specId) {
        const menu = document.getElementById(`menu-${uniqueId}`);
        const open = menu.style.display === "block";
        document.querySelectorAll('.custom-menu').forEach(m => m.style.display = "none");
        if (!open) {
            menu.innerHTML = (nameData[specId] || []).map(n => `<div onmousedown="selectName('${uniqueId}', '${n}')">${n}</div>`).join('');
            menu.style.display = "block";
        }
    }

    function selectName(uniqueId, name) {
        const input = document.getElementById(`input-${uniqueId}`);
        input.value = name;
        input.classList.add('new-entry');
        const ghost = document.getElementById(`ghost-${uniqueId}`);
        ghost.innerText = "";
        ghost.removeAttribute('data-full-match');
    }

    function unlockTable() {
        const wrapper = document.getElementById('app-wrapper');
        wrapper.style.opacity = "1";
        wrapper.style.pointerEvents = "auto";
        document.getElementById('led').className = "led-dot led-ready";
        const status = document.getElementById('status-text');
        status.innerText = "System Ready 🇮🇶";
        status.className = "text-[0.65rem] font-black text-emerald-500 uppercase tracking-widest";
    }

    async function saveAll() {
        const btn = document.getElementById('save-btn');
        const activeInputs = Array.from(document.querySelectorAll('.cell-input')).filter(i => i.value.trim() !== "");
        if (!activeInputs.length) return;

        btn.disabled = true; btn.innerText = "UPLOADING...";
        const bulkData = activeInputs.map(el => ({ date: el.dataset.date, specialty: el.dataset.spec, name: el.value.trim() }));
        
        try {
            await fetch(scriptUrl, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ payload: bulkData }) });
            btn.innerText = "SYNCED ✅";
            activeInputs.forEach(i => { i.classList.remove('new-entry'); i.classList.add('prefilled'); });
        } catch (e) { btn.innerText = "FAILED ⚠️"; }
        setTimeout(() => { btn.disabled = false; btn.innerText = "UPDATE DATABASE"; }, 2000);
    }
</script>
</body>
</html>
