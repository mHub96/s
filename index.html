<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MRJ SCHEDULER 🇮🇶</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;600;700&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0b0e11; --card: #16191d; --column-width: 290px; --font-size: 0.9rem; --nav-h: 70px; }
        
        .track-NS { --spec-color: #fbbf24; } .track-CT { --spec-color: #f87171; } 
        .track-GS { --spec-color: #34d399; } .track-US { --spec-color: #60a5fa; } 
        .track-ENT { --spec-color: #a78bfa; } .track-H { --spec-color: #fb7185; } 
        .track-D { --spec-color: #94a3b8; } .track-OP { --spec-color: #fb923c; } 
        .track-ICU { --spec-color: #2dd4bf; } .track-R { --spec-color: #818cf8; } 
        .track-ON { --spec-color: #f472b6; } 

        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #94a3b8; margin: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        .board-container { flex-grow: 1; display: flex; gap: 1.5rem; padding: 1.5rem 1.5rem 3rem 1.5rem; overflow-x: auto; align-items: flex-start; box-sizing: border-box; height: calc(100vh - var(--nav-h)); }
        
        .specialty-track { flex: 0 0 var(--column-width); background: var(--card); border-radius: 1.8rem; display: flex; flex-direction: column; max-height: 92%; border: 1px solid rgba(255,255,255,0.04); box-shadow: 0 20px 40px -15px rgba(0,0,0,0.8), 0 0 15px -5px var(--spec-color); overflow: hidden; }
        
        .track-header { padding: 1.2rem; text-align: center; flex-shrink: 0; background: linear-gradient(to bottom, rgba(255,255,255,0.03), transparent); border-bottom: 3px solid var(--spec-color); }
        .track-header h2 { color: var(--spec-color); font-weight: 900; font-size: 0.75rem; letter-spacing: 0.15em; text-transform: uppercase; }
        
        .days-list { flex: 1; overflow-y: auto; padding: 0.75rem; padding-bottom: 2rem; scrollbar-width: none; }
        .days-list::-webkit-scrollbar { display: none; }

        .day-box { position: relative; background: rgba(255,255,255,0.02); margin-bottom: 0.5rem; border-radius: 0.9rem; padding: 0.4rem; border: 1px solid transparent; }
        .day-box:focus-within { border-color: var(--spec-color); background: rgba(255,255,255,0.04); }
        .day-box.weekend { background: rgba(255,255,255,0.05); border-left: 3px solid var(--spec-color); }
        
        .day-label { display: flex; justify-content: space-between; font-size: 0.6rem; font-weight: 800; margin-bottom: 0.2rem; color: #4b5563; padding: 0 0.5rem; }
        
        .input-wrapper { position: relative; width: 100%; direction: rtl; text-align: right; }

        .cell-input, .ghost-text { 
            width: 100%; 
            font-family: 'IBM Plex Sans Arabic', sans-serif; 
            font-size: var(--font-size); 
            padding: 0.6rem 0.75rem; 
            line-height: 1.2;
            text-align: right; 
            box-sizing: border-box; 
            white-space: pre;
            margin: 0;
            border: none;
            font-weight: 700;
        }

        .cell-input { background: transparent; outline: none; color: #fff; position: relative; z-index: 10; direction: rtl; }
        
        .ghost-text { 
            position: absolute; top: 0; right: 0; color: rgba(255,255,255,0.15); 
            z-index: 5; pointer-events: none; height: 100%; display: flex; 
            align-items: center; justify-content: flex-start; direction: rtl; background: transparent;
        }

        .ghost-offset { color: transparent; visibility: hidden; white-space: pre; }

        .dropdown-arrow { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 0.5rem; color: #334155; cursor: pointer; z-index: 25; padding: 6px; }
        
        .custom-menu { position: absolute; top: 100%; right: 0; width: 100%; max-height: 180px; overflow-y: auto; background: #1c1f26; border: 1px solid var(--spec-color); border-radius: 0.6rem; z-index: 1000; display: none; }
        .custom-menu div { padding: 0.8rem; font-size: 0.8rem; text-align: right; cursor: pointer; color: #94a3b8; }
        .custom-menu div:hover { background: var(--spec-color); color: #000; }
        
        .prefilled { color: var(--spec-color) !important; font-weight: 600; }
        .new-entry { color: #fff !important; font-weight: 700; }
        
        .nav-bar { height: var(--nav-h); padding: 0 1.5rem; display: flex; justify-content: space-between; align-items: center; background: #111418; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .loading-active { opacity: 0.3 !important; pointer-events: none !important; cursor: wait; }
    </style>
</head>
<body>

    <div id="app-wrapper" class="loading-active">
        <div class="nav-bar">
            <h1 class="text-lg font-black text-white uppercase tracking-tighter">Scheduler 🇮🇶</h1>
            <div class="flex gap-4 items-center">
                <input type="month" id="month-picker" class="bg-black text-amber-500 px-3 py-1.5 rounded-lg font-bold border border-white/10 text-xs">
                <button onclick="saveToGithub()" id="sync-btn" class="bg-white text-black px-5 py-2 rounded-lg font-black text-[10px] uppercase active:scale-95 transition-transform">UPDATE</button>
                
                <button onclick="migrateFromGoogle()" id="migrate-btn" class="hidden bg-green-600 text-white px-5 py-2 rounded-lg font-black text-[10px] uppercase">Migrate</button>
                <button id="login-btn" onclick="login()" class="bg-blue-600 text-white px-5 py-2 rounded-lg font-black text-[10px] uppercase">Login</button>
            </div>
        </div>
        <div class="board-container" id="board" onscroll="closeAllMenus()"></div>
    </div>

<script>
    const CONFIG = {
        user: "mHub96", 
        repo: "s", 
        path: "data.json",
        // Added a cache-buster to the URL to ensure fresh data
        apiUrl: () => `https://api.github.com/repos/mHub96/s/contents/data.json?t=${Date.now()}`
    };

    // TOKEN SPLIT 🇮🇶
    const t1 = "ghp_dAUtsFhTH";
    const t2 = "a2KeJQOsxsC";
    const t3 = "Ct1vz8z1Z63";
    const t4 = "AmsjS";
    
    let GH_TOKEN = t1 + t2 + t3 + t4;
    
    let db = { names: [], schedule: [] };
    let fileSha = "";

    const specialties = [
        { id: "NS", name: "Neurosurgery" }, { id: "CT", name: "Cardiothoracic" },
        { id: "GS", name: "General Surg" }, { id: "US", name: "Urosurgery" },
        { id: "ENT", name: "ENT Dept" }, { id: "H", name: "Cardiology" },
        { id: "D", name: "Death Certs" }, { id: "OP", name: "OT Anaesth" },
        { id: "ICU", name: "ICU Anaesth" }, { id: "R", name: "Radiology" },
        { id: "ON", name: "Oncology" }
    ];

    window.onload = async () => {
        const now = new Date();
        const nextMonthDate = new Date(now.getFullYear(), now.getMonth() + 1, 1);
        const picker = document.getElementById('month-picker');
        if(picker) {
            picker.value = `${nextMonthDate.getFullYear()}-${String(nextMonthDate.getMonth() + 1).padStart(2, '0')}`;
            picker.onchange = refreshView;
        }
        await init();
    };

    async function init() {
        const wrapper = document.getElementById('app-wrapper');
        wrapper.classList.add('loading-active');
        
        try {
            const res = await fetch(CONFIG.apiUrl(), {
                headers: { 
                    "Authorization": `token ${GH_TOKEN}`,
                    "Accept": "application/vnd.github.v3+json"
                }
            });

            if (!res.ok) throw new Error(`GitHub returned ${res.status}`);

            const data = await res.json();
            fileSha = data.sha;
            
            // Critical: Correct way to decode Base64 with UTF-8 (Arabic) support
            const decoded = decodeURIComponent(atob(data.content).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));

            db = JSON.parse(decoded);
            
            // Normalize names
            db.names = (db.names || []).map(item => {
                if (Array.isArray(item)) return { name: item[0], spec: item[1] || "NS", phone: "" };
                return item;
            });

            // These functions must exist in your code to render the UI
            if (typeof updateNameLookup === "function") updateNameLookup();
            if (typeof refreshView === "function") refreshView();

        } catch (e) {
            console.error("Init Error:", e);
            alert("فشل في تحميل البيانات. تأكد من اتصال الإنترنت.");
        } finally {
            // GUARANTEE: Remove the loading overlay even if fetch fails
            wrapper.classList.remove('loading-active');
        }
    }

    async function saveToGithub() {
        const btn = document.getElementById('sync-btn');
        const oldText = btn.innerText;
        btn.innerText = "UPDATING...";
        btn.disabled = true;

        try {
            // Collect UI data
            const inputs = Array.from(document.querySelectorAll('.cell-input')).filter(i => i.value.trim() !== "");
            const currentData = inputs.map(i => ({ 
                date: i.dataset.date, 
                specCode: i.dataset.spec, 
                name: i.value.trim() 
            }));

            const [yr, mon] = document.getElementById('month-picker').value.split('-');
            
            // Merge logic: Remove existing entries for this month, then add new ones
            db.schedule = [
                ...(db.schedule || []).filter(r => !r.date || !r.date.endsWith(`${mon}/${yr}`)), 
                ...currentData
            ];

            // Encode for Arabic support
            const jsonString = JSON.stringify(db, null, 2);
            const base64Content = btoa(unescape(encodeURIComponent(jsonString)));

            const body = { 
                message: `Scheduler Sync ${mon}/${yr} 🇮🇶`, 
                content: base64Content, 
                sha: fileSha 
            };

            const res = await fetch(`https://api.github.com/repos/${CONFIG.user}/${CONFIG.repo}/contents/${CONFIG.path}`, {
                method: "PUT", 
                headers: { 
                    "Authorization": `token ${GH_TOKEN}`,
                    "Content-Type": "application/json"
                }, 
                body: JSON.stringify(body)
            });

            if (res.ok) {
                const update = await res.json();
                fileSha = update.content.sha;
                btn.innerText = "DONE ✅";
            } else { 
                const err = await res.json();
                console.error("Save Error:", err);
                btn.innerText = "Error ❌"; 
            }
        } catch(e) { 
            console.error(e);
            btn.innerText = "Error"; 
        } finally {
            setTimeout(() => {
                btn.innerText = oldText;
                btn.disabled = false;
            }, 2000);
        }
    }
</script>
</body>
</html>
