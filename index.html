<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MD Scheduler | Carbon Gold</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #1a1c20;
            --light: #2a2d34;
            --shadow: #0d0e11;
            --accent: #fbbf24;
            --btn-grey: #33373e;
        }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #94a3b8; margin: 0; overflow-x: hidden; }
        
        /* Premium Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--light); border-radius: 10px; }

        .embossed-card {
            background: var(--bg);
            border-radius: 2rem;
            box-shadow: 20px 20px 60px var(--shadow), -10px -10px 40px var(--light);
        }

        .recessed-table-container {
            background: var(--bg);
            border-radius: 1.5rem;
            box-shadow: inset 8px 8px 16px var(--shadow), inset -4px -4px 12px var(--light);
            overflow-x: auto;
        }

        table { border-collapse: separate; border-spacing: 0; width: 100%; }
        th { 
            position: sticky; top: 0; background: var(--bg); z-index: 10;
            padding: 1rem; color: var(--accent); font-weight: 800; font-size: 0.75rem;
            letter-spacing: 0.1em; border-bottom: 1px solid var(--light);
        }
        
        td { padding: 0.5rem; border-bottom: 1px solid rgba(255,255,255,0.03); }

        .cell-input {
            background: transparent;
            color: #e2e8f0;
            width: 100%;
            padding: 0.5rem;
            border-radius: 0.5rem;
            border: 1px solid transparent;
            transition: all 0.3s;
            font-size: 0.85rem;
        }
        .cell-input:focus {
            background: rgba(251, 191, 36, 0.05);
            border-color: var(--accent);
            outline: none;
        }

        .date-col { color: #64748b; font-family: monospace; font-weight: bold; text-align: center; }
        .day-col { color: var(--accent); font-weight: 800; text-align: center; }

        #shield { position: fixed; inset: 0; background: var(--bg); z-index: 100; transition: opacity 0.5s; }
        
        .save-btn {
            background: var(--bg);
            box-shadow: 5px 5px 10px var(--shadow), -3px -3px 8px var(--light);
            transition: all 0.3s;
        }
        .save-btn:active { box-shadow: inset 2px 2px 5px var(--shadow); transform: scale(0.98); }
    </style>
</head>
<body class="p-4 md:p-8">
    <div id="shield"></div>

    <div class="max-w-7xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
            <div>
                <h1 class="text-white text-3xl font-extrabold tracking-tight">Monthly Schedule 🇮🇶</h1>
                <p class="text-amber-500/60 font-bold text-xs uppercase tracking-widest mt-1">Surgical Rotations Manager</p>
            </div>
            
            <div class="recessed-table-container p-2 flex items-center gap-4">
                <input type="month" id="month-picker" 
                    class="bg-transparent text-amber-500 font-bold outline-none p-2 cursor-pointer"
                    onchange="generateTable()">
            </div>
        </div>

        <div class="embossed-card p-6">
            <div class="recessed-table-container max-h-[70vh]">
                <table id="schedule-table">
                    <thead>
                        <tr id="table-headers">
                            </tr>
                    </thead>
                    <tbody id="table-body">
                        </tbody>
                </table>
            </div>
            
            <div class="mt-8 flex justify-end">
                <button onclick="saveAll()" class="save-btn px-10 py-4 rounded-xl text-amber-500 font-black uppercase tracking-widest">
                    Push to Database
                </button>
            </div>
        </div>
    </div>

    <div id="datalist-container"></div>

<script>
    const scriptUrl = "YOUR_APPS_SCRIPT_URL"; // Use your existing Apps Script URL
    const specialties = [
        { id: "NS", name: "Neurosurgery" },
        { id: "CT", name: "Cardiothoracic" },
        { id: "GS", name: "General Surgery" },
        { id: "US", name: "Urosurgery" },
        { id: "ENT", name: "ENT" },
        { id: "H", name: "Cardiology" },
        { id: "OP", name: "Anaesthesia (OP)" },
        { id: "ICU", name: "Anaesthesia (ICU)" },
        { id: "R", name: "Radiology" },
        { id: "ON", name: "Oncology" },
        { id: "PS", name: "Plastic Surgery" }
    ];

    let allResidents = [];

    window.onload = async () => {
        // Set default month to current
        const now = new Date();
        const monthVal = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
        document.getElementById('month-picker').value = monthVal;

        try {
            const res = await fetch(`${scriptUrl}?action=getNames`);
            allResidents = await res.json();
            setupDatalists();
            generateTable();
        } catch (e) {
            console.error("Fetch failed", e);
            generateTable(); // Still generate table structure even if offline
        }

        setTimeout(() => {
            document.getElementById('shield').style.opacity = '0';
            setTimeout(() => document.getElementById('shield').remove(), 500);
        }, 500);
    };

    function setupDatalists() {
        const container = document.getElementById('datalist-container');
        specialties.forEach(spec => {
            const dl = document.createElement('datalist');
            dl.id = `list-${spec.id}`;
            
            // Filter names for this specialty
            let filtered = [];
            if (spec.id === "OP" || spec.id === "ICU") {
                filtered = allResidents.filter(r => r[1] === "A");
            } else {
                filtered = allResidents.filter(r => r[1] === spec.id);
            }

            dl.innerHTML = filtered.map(r => `<option value="${r[0]}">`).join('');
            container.appendChild(dl);
        });
    }

    function generateTable() {
        const picker = document.getElementById('month-picker').value;
        if (!picker) return;

        const [year, month] = picker.split('-').map(Number);
        const daysInMonth = new Date(year, month, 0).getDate();
        
        // Headers (Right to Left Logic for first two cols)
        const headerRow = document.getElementById('table-headers');
        let html = ``;
        
        // Data Columns (Specialties)
        specialties.forEach(s => {
            html += `<th>${s.name}</th>`;
        });
        
        // Date and Day (Farthest Right)
        html += `<th class="w-24 border-l border-slate-800">Date</th>`;
        html += `<th class="w-16">Day</th>`;
        headerRow.innerHTML = html;

        // Body
        const body = document.getElementById('table-body');
        body.innerHTML = "";

        for (let d = 1; d <= daysInMonth; d++) {
            const dateObj = new Date(year, month - 1, d);
            const dayName = dateObj.toLocaleDateString('en-US', { weekday: 'short' });
            const dateStr = `${String(d).padStart(2, '0')}/${String(month).padStart(2, '0')}/${year}`;
            
            const tr = document.createElement('tr');
            let rowHtml = ``;

            // Specialty Cells
            specialties.forEach(s => {
                rowHtml += `<td>
                    <input type="text" 
                        class="cell-input" 
                        list="list-${s.id}" 
                        placeholder="..."
                        data-date="${dateStr}"
                        data-spec="${s.id}">
                </td>`;
            });

            // Date & Day Cells
            rowHtml += `<td class="date-col border-l border-slate-800/30">${dateStr}</td>`;
            rowHtml += `<td class="day-col">${dayName}</td>`;
            
            tr.innerHTML = rowHtml;
            body.appendChild(tr);
        }
    }

    async function saveAll() {
        const btn = document.querySelector('.save-btn');
        const inputs = document.querySelectorAll('.cell-input');
        const updates = [];

        inputs.forEach(input => {
            if (input.value.trim() !== "") {
                updates.push({
                    date: input.getAttribute('data-date'),
                    specialty: input.getAttribute('data-spec'),
                    name: input.value
                });
            }
        });

        if (updates.length === 0) return alert("No changes to save.");

        btn.innerText = "UPLOADING...";
        btn.disabled = true;

        try {
            // Sending as a batch update to your GS script
            await fetch(scriptUrl, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({
                    action: "bulkUpdateSchedule",
                    payload: updates
                })
            });
            
            btn.innerText = "SUCCESS ✅";
            btn.style.color = "#10b981";
            setTimeout(() => {
                btn.innerText = "Push to Database";
                btn.style.color = "#fbbf24";
                btn.disabled = false;
            }, 3000);
        } catch (e) {
            btn.innerText = "RETRY";
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
