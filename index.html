<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MD Scheduler | Carbon Gold</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #1a1c20;
            --light: #2a2d34;
            --shadow: #0d0e11;
            --accent: #fbbf24;
            --crimson: #e11d48;
            --emerald: #10b981;
        }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #94a3b8; margin: 0; }
        
        /* Premium Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--light); border-radius: 10px; }

        .embossed-card {
            background: var(--bg);
            border-radius: 2rem;
            box-shadow: 20px 20px 60px var(--shadow), -10px -10px 40px var(--light);
        }

        .recessed-table-container {
            background: var(--bg);
            border-radius: 1.5rem;
            box-shadow: inset 8px 8px 16px var(--shadow), inset -4px -4px 12px var(--light);
            overflow-x: auto;
        }

        /* LOCK STATE */
        #main-table-area { pointer-events: none; opacity: 0.5; transition: all 0.5s ease; }
        .is-ready #main-table-area { pointer-events: auto; opacity: 1; }

        /* BLINKER SYSTEM */
        .led-dot {
            width: 8px; height: 8px; border-radius: 50%;
            display: inline-block; margin-right: 8px;
        }
        .led-loading { background: var(--crimson); box-shadow: 0 0 10px var(--crimson); animation: blink 1s infinite; }
        .led-ready { background: var(--emerald); box-shadow: 0 0 10px var(--emerald); }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        table { border-collapse: separate; border-spacing: 0; min-width: 1400px; }
        th { 
            position: sticky; top: 0; background: var(--bg); z-index: 10;
            padding: 1.2rem; color: var(--accent); font-weight: 800; font-size: 0.7rem;
            letter-spacing: 0.15em; border-bottom: 1px solid var(--light);
            white-space: nowrap;
        }
        
        td { padding: 0.4rem; border-bottom: 1px solid rgba(255,255,255,0.03); }

        .cell-input {
            background: transparent; color: #e2e8f0; width: 100%; min-width: 190px;
            padding: 0.6rem; border-radius: 0.8rem; border: 1px solid transparent;
            transition: all 0.3s; font-size: 0.9rem;
        }
        .cell-input:focus {
            background: rgba(251, 191, 36, 0.08); border-color: var(--accent);
            outline: none; box-shadow: 0 0 15px rgba(251, 191, 36, 0.2);
        }

        .date-col { color: #64748b; font-family: monospace; font-weight: bold; text-align: center; width: 110px; }
        .day-col { color: var(--accent); font-weight: 800; text-align: center; width: 80px; }

        #shield { position: fixed; inset: 0; background: var(--bg); z-index: 100; transition: opacity 0.5s; }
        
        .save-btn {
            background: var(--bg);
            box-shadow: 10px 10px 20px var(--shadow), -5px -5px 15px var(--light);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div id="shield"></div>

    <div id="app-container" class="max-w-full mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-6">
            <div>
                <h1 class="text-white text-3xl font-extrabold tracking-tight">Monthly Scheduler 🇮🇶</h1>
                
                <div class="mt-2 flex items-center">
                    <span id="led" class="led-dot led-loading"></span>
                    <span id="status-text" class="text-[0.6rem] font-black uppercase tracking-[0.2em] text-rose-500">System Loading...</span>
                </div>
            </div>
            
            <div class="recessed-table-container p-2 flex items-center gap-4">
                <input type="month" id="month-picker" 
                    class="bg-transparent text-amber-500 font-bold outline-none p-2 cursor-pointer"
                    onchange="generateTable()">
            </div>
        </div>

        <div id="main-table-area" class="embossed-card p-6">
            <div class="recessed-table-container max-h-[70vh]">
                <table id="schedule-table">
                    <thead><tr id="table-headers"></tr></thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
            
            <div class="mt-8 flex justify-end">
                <button id="save-btn" onclick="saveAll()" class="save-btn px-12 py-5 rounded-2xl text-amber-500 font-black uppercase tracking-widest">
                    Push to Database
                </button>
            </div>
        </div>
    </div>

    <div id="datalist-container"></div>

<script>
    const scriptUrl = "https://script.google.com/macros/s/AKfycbwj99w9IceN2W1aF3S-jN6yFypMBszvb1xv7FTUuYrW-GbYjC4ediZHrscrloeprwCSSw/exec";
    
    const specialties = [
        { id: "NS", name: "Neurosurgery" },
        { id: "CT", name: "Cardiothoracic" },
        { id: "GS", name: "General Surgery" },
        { id: "US", name: "Urosurgery" },
        { id: "ENT", name: "ENT" },
        { id: "H", name: "Cardiology" },
        { id: "D", name: "Death Certs" },
        { id: "OP", name: "Anaesthesia (OP)" },
        { id: "ICU", name: "Anaesthesia (ICU)" },
        { id: "R", name: "Radiology" },
        { id: "ON", name: "Oncology" },
        { id: "PS", name: "Plastic Surgery" }
    ];

    let allResidents = [];

    window.onload = async () => {
        const now = new Date();
        const monthVal = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
        document.getElementById('month-picker').value = monthVal;

        try {
            const res = await fetch(`${scriptUrl}?action=getNames`);
            allResidents = await res.json();
            
            // Logic to unlock the table
            setupDatalists();
            generateTable();
            setReady(); // Trigger the green light

        } catch (e) {
            document.getElementById('status-text').innerText = "Offline Mode";
            generateTable(); 
        }

        setTimeout(() => {
            document.getElementById('shield').style.opacity = '0';
            setTimeout(() => document.getElementById('shield').remove(), 500);
        }, 500);
    };

    function setReady() {
        const led = document.getElementById('led');
        const status = document.getElementById('status-text');
        const app = document.getElementById('app-container');

        led.className = "led-dot led-ready";
        status.innerText = "Ready 🇮🇶";
        status.className = "text-[0.6rem] font-black uppercase tracking-[0.2em] text-emerald-500";
        app.classList.add('is-ready'); // Removes the opacity and lock
    }

    function setupDatalists() {
        const container = document.getElementById('datalist-container');
        container.innerHTML = ""; 
        specialties.forEach(spec => {
            const dl = document.createElement('datalist');
            dl.id = `list-${spec.id}`;
            let filtered = (spec.id === "OP" || spec.id === "ICU") ? allResidents.filter(r => r[1] === "A") : (spec.id === "D" ? allResidents : allResidents.filter(r => r[1] === spec.id));
            dl.innerHTML = filtered.map(r => `<option value="${r[0]}">`).join('');
            container.appendChild(dl);
        });
    }

    function generateTable() {
        const picker = document.getElementById('month-picker').value;
        const [year, month] = picker.split('-').map(Number);
        const daysInMonth = new Date(year, month, 0).getDate();
        
        const headerRow = document.getElementById('table-headers');
        let hHtml = ``;
        specialties.forEach(s => hHtml += `<th>${s.name}</th>`);
        hHtml += `<th class="date-col border-l border-slate-800">Date</th><th class="day-col">Day</th>`;
        headerRow.innerHTML = hHtml;

        const body = document.getElementById('table-body');
        body.innerHTML = "";

        for (let d = 1; d <= daysInMonth; d++) {
            const dateObj = new Date(year, month - 1, d);
            const dayName = dateObj.toLocaleDateString('en-US', { weekday: 'short' });
            const dateStr = `${String(d).padStart(2, '0')}/${String(month).padStart(2, '0')}/${year}`;
            const tr = document.createElement('tr');
            let rHtml = ``;

            specialties.forEach(s => {
                rHtml += `<td><input type="text" class="cell-input" list="list-${s.id}" placeholder="Select Resident..." data-date="${dateStr}" data-spec="${s.id}"></td>`;
            });

            rHtml += `<td class="date-col border-l border-slate-800/30">${dateStr}</td><td class="day-col">${dayName}</td>`;
            tr.innerHTML = rHtml;
            body.appendChild(tr);
        }
    }

    async function saveAll() {
        const btn = document.getElementById('save-btn');
        const inputs = document.querySelectorAll('.cell-input');
        const updates = [];

        inputs.forEach(input => {
            if (input.value.trim() !== "") {
                updates.push({
                    date: input.getAttribute('data-date'),
                    specialty: input.getAttribute('data-spec'),
                    name: input.value
                });
            }
        });

        if (updates.length === 0) return;

        btn.innerText = "UPLOADING...";
        btn.disabled = true;

        try {
            await fetch(scriptUrl, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ action: "bulkUpdateSchedule", payload: updates })
            });
            btn.innerText = "SUCCESS ✅";
            setTimeout(() => { btn.innerText = "Push to Database"; btn.disabled = false; }, 3000);
        } catch (e) { btn.innerText = "RETRY"; btn.disabled = false; }
    }
</script>
</body>
</html>
